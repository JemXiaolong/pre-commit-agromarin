- id: agromarin-fix
  name: AgroMarin auto-fix (Python)
  description: >
    Run custom fixers + autoflake + pyupgrade + isort + black
    in a single pass.
  entry: agromarin-fix
  language: python
  types: [python]
  require_serial: true

- id: agromarin-check
  name: AgroMarin lint check (Python)
  description: >
    Run flake8 with bugbear plugin.
  entry: agromarin-check
  language: python
  types: [python]
  require_serial: true

- id: agromarin-po-format
  name: AgroMarin .po formatter
  description: Sort entries by msgid and clean redundant translations.
  entry: agromarin-po-format
  language: python
  types: [pofile]

- id: agromarin-prettier
  name: AgroMarin Prettier (XML/JS)
  description: Format XML and JavaScript files with Prettier.
  entry: prettier --write
  language: node
  types_or: [javascript, xml]
  additional_dependencies:
    - 'prettier@3.4.2'
    - '@prettier/plugin-xml@3.4.1'

- id: agromarin-eslint
  name: AgroMarin ESLint (JS)
  description: Lint JavaScript files with ESLint and Odoo globals.
  entry: eslint --config .eslintrc.json
  language: node
  types: [javascript]
  additional_dependencies:
    - eslint@8.57.1
