# Template pre-commit configuration for AgroMarin Odoo repositories
#
# Copy this file to your repo root as .pre-commit-config.yaml
# and adjust versions/hooks as needed.

exclude: |
  (?x)(
    ^setup/|/static/description/index\.html$|
    .svg$|/tests/([^/]+/)?cassettes/|
    ^README\.md$|
    /static/(src/)?lib/|
    ^docs/_templates/.*\.html$|
    (LICENSE.*|COPYING.*)|
    (\.travis\.yml|\.gitlab\-ci\.yml|\.pre\-commit\-config*\.yaml)|
    (/migrations/1[0-4])|
    (/doc/|/docs/)
  )
default_language_version:
  python: python3

repos:
  # === AgroMarin custom hooks ===
  - repo: https://github.com/JemXiaolong/pre-commit-agromarin
    rev: v1.0.0
    hooks:
      - id: agromarin-po-format
      - id: agromarin-auto-fix

  # === Formatters (auto-fix) ===
  - repo: https://github.com/psf/black
    rev: '26.1.0'
    hooks:
      - id: black
        args: [--line-length=88]

  - repo: https://github.com/pycqa/isort
    rev: '7.0.0'
    hooks:
      - id: isort
        args: [--profile=black, --line-length=88]

  # === Linters ===
  - repo: https://github.com/PyCQA/flake8
    rev: '7.3.0'
    hooks:
      - id: flake8

  - repo: https://github.com/OCA/pylint-odoo
    rev: v9.3.23
    hooks:
      - id: pylint_odoo
        args:
          - --rcfile=.pylintrc

  # === File checks ===
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-xml
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: check-merge-conflict
        exclude: /README\.rst$|^docs/.*\.rst$
      - id: debug-statements

  # === OCA (Odoo Community Association) ===
  - repo: https://github.com/OCA/odoo-pre-commit-hooks
    rev: v0.2.20
    hooks:
      - id: oca-checks-po
      - id: oca-checks-odoo-module
      - id: oca-checks-odoo-module-fixit

  # === Commit message ===
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
