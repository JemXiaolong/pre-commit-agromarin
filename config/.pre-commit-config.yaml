# Template pre-commit configuration for AgroMarin Odoo repositories
#
# Copy this file to your repo root as .pre-commit-config.yaml
# and adjust versions/hooks as needed.

exclude: |
  (?x)(
    ^setup/|/static/description/index\.html$|
    .svg$|/tests/([^/]+/)?cassettes/|
    ^README\.md$|
    /static/(src/)?lib/|
    ^docs/_templates/.*\.html$|
    (LICENSE.*|COPYING.*)|
    (\.travis\.yml|\.gitlab\-ci\.yml|\.pre\-commit\-config*\.yaml)|
    (/migrations/1[0-4])|
    (/doc/|/docs/)
  )
default_language_version:
  python: python3

repos:
  # === AgroMarin (bundles: autoflake + pyupgrade + black + isort + flake8 + bugbear) ===
  - repo: https://github.com/JemXiaolong/pre-commit-agromarin
    rev: v2.0.0
    hooks:
      - id: agromarin-fix
      - id: agromarin-check
      - id: agromarin-po-format

  # === Prettier (node-based, cannot bundle in Python) ===
  - repo: local
    hooks:
      - id: prettier
        name: prettier (XML/JS)
        entry: prettier --write --plugin=@prettier/plugin-xml
        language: node
        types_or: [javascript, xml]
        additional_dependencies:
          - prettier@3.4.2
          - '@prettier/plugin-xml@3.4.1'

  # === Pylint-Odoo (heavy deps, kept separate) ===
  - repo: https://github.com/OCA/pylint-odoo
    rev: v9.3.23
    hooks:
      - id: pylint_odoo
        args:
          - --rcfile=.pylintrc

  # === File checks ===
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-xml
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: check-merge-conflict
        exclude: /README\.rst$|^docs/.*\.rst$
      - id: debug-statements

  # === OCA (Odoo Community Association) ===
  - repo: https://github.com/OCA/odoo-pre-commit-hooks
    rev: v0.2.20
    hooks:
      - id: oca-checks-po
      - id: oca-checks-odoo-module
      - id: oca-checks-odoo-module-fixit

  # === Commit message ===
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
